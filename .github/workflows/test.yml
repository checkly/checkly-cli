name: test

on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: "npm"
          cache-dependency-path: package-lock.json
      - run: npm config set fund false && npm set audit false
      - run: npm ci
      # Test that the packaging works as well
      - run: npm pack --workspaces
      - run: npm run lint
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest-x64]
    name: test - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: "npm"
          cache-dependency-path: package-lock.json
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: npm config set fund false && npm set audit false
      - run: npm ci
      - run: npm run prepack
      - run: npm run test
      # TEMP DEBUG (AI-114): print a non-secret fingerprint of the e2e
      # account so we can verify which account the secrets resolve to
      # without leaking the actual ID/name. Compare the SHA-256 hashes
      # against `node -e "console.log(require('crypto').createHash('sha256').update('<candidate>').digest('hex'))"` locally.
      # Remove once the right account is confirmed.
      - name: Debug — e2e account fingerprint (TEMP)
        if: matrix.os == 'ubuntu-latest'
        env:
          CHECKLY_ACCOUNT_ID: ${{ secrets.E2E_CHECKLY_ACCOUNT_ID }}
          CHECKLY_ACCOUNT_NAME: ${{ secrets.E2E_CHECKLY_ACCOUNT_NAME }}
          CHECKLY_API_KEY: ${{ secrets.E2E_CHECKLY_API_KEY }}
        run: |
          set -e
          echo "::group::E2E account fingerprint"

          ID_HASH=$(node -e "console.log(require('crypto').createHash('sha256').update(process.env.CHECKLY_ACCOUNT_ID || '').digest('hex'))")
          NAME_HASH=$(node -e "console.log(require('crypto').createHash('sha256').update(process.env.CHECKLY_ACCOUNT_NAME || '').digest('hex'))")
          echo "Secret CHECKLY_ACCOUNT_ID   sha256: $ID_HASH"
          echo "Secret CHECKLY_ACCOUNT_NAME sha256: $NAME_HASH"

          # Hit /next/accounts/<id> to confirm credentials are valid and
          # to see what account the API actually responds with. The full
          # response is captured into a variable (never echoed) and only
          # the SHA-256 + a couple of non-secret fields are printed.
          ACCOUNT_RESPONSE=$(curl -sf "https://api.checklyhq.com/next/accounts/$CHECKLY_ACCOUNT_ID" \
            -H "Authorization: Bearer $CHECKLY_API_KEY" \
            -H "x-checkly-account: $CHECKLY_ACCOUNT_ID" || echo '__REQUEST_FAILED__')

          if [ "$ACCOUNT_RESPONSE" = "__REQUEST_FAILED__" ]; then
            echo "Account lookup FAILED — credentials may be invalid"
          else
            printf '%s' "$ACCOUNT_RESPONSE" | node -e "
              let d=''
              process.stdin.on('data',c=>d+=c).on('end',()=>{
                const a=JSON.parse(d)
                const sha=s=>require('crypto').createHash('sha256').update(String(s ?? '')).digest('hex')
                console.log('  /next/accounts response:')
                console.log('    .id            sha256:  ' + sha(a.id))
                console.log('    .name          sha256:  ' + sha(a.name))
                console.log('    .plan:                  ' + (a.plan ?? '(none)'))
                console.log('    .planDisplayName:       ' + (a.planDisplayName ?? '(none)'))
                console.log('    .runtimeId:             ' + (a.runtimeId ?? '(none)'))
              })
            "
          fi

          # Show the live AGENTIC_CHECKS entitlement (this is what the
          # deploy-time gate compares usage against). Useful to confirm
          # whether the maxAgenticChecks bump landed on the right row.
          ENTITLEMENTS_RESPONSE=$(curl -sf "https://api.checklyhq.com/v1/accounts/me/entitlements" \
            -H "Authorization: Bearer $CHECKLY_API_KEY" \
            -H "x-checkly-account: $CHECKLY_ACCOUNT_ID" || echo '__REQUEST_FAILED__')

          if [ "$ENTITLEMENTS_RESPONSE" = "__REQUEST_FAILED__" ]; then
            echo "Entitlements lookup FAILED"
          else
            printf '%s' "$ENTITLEMENTS_RESPONSE" | node -e "
              let d=''
              process.stdin.on('data',c=>d+=c).on('end',()=>{
                const r=JSON.parse(d)
                const ag=(r.entitlements||[]).find(e=>e.key==='AGENTIC_CHECKS')
                console.log('  /v1/accounts/me/entitlements:')
                console.log('    plan:                       ' + (r.plan ?? '(none)'))
                if (ag) {
                  console.log('    AGENTIC_CHECKS.enabled:     ' + ag.enabled)
                  console.log('    AGENTIC_CHECKS.quantity:    ' + (ag.quantity ?? '(unlimited)'))
                  console.log('    AGENTIC_CHECKS.type:        ' + ag.type)
                } else {
                  console.log('    AGENTIC_CHECKS:             (not present in entitlements)')
                }
              })
            "
          fi

          # Count how many AGENTIC checks already exist in the account.
          # If this is anywhere near the cap, stale orphans are eating
          # the budget — not the bump that didn't take effect.
          CHECKS_RESPONSE=$(curl -sf "https://api.checklyhq.com/v1/checks?limit=100" \
            -H "Authorization: Bearer $CHECKLY_API_KEY" \
            -H "x-checkly-account: $CHECKLY_ACCOUNT_ID" || echo '[]')
          AGENTIC_COUNT=$(printf '%s' "$CHECKS_RESPONSE" | node -e "
            let d=''
            process.stdin.on('data',c=>d+=c).on('end',()=>{
              try {
                const r=JSON.parse(d)
                const list=Array.isArray(r) ? r : (r.data || [])
                console.log(list.filter(c=>c.checkType==='AGENTIC').length)
              } catch { console.log('parse-error') }
            })
          ")
          echo "  Existing AGENTIC checks in account (first 100 of /v1/checks): $AGENTIC_COUNT"
          echo "::endgroup::"
      - run: npm run test:e2e
        env:
          CHECKLY_ACCOUNT_NAME: ${{ secrets.E2E_CHECKLY_ACCOUNT_NAME }}
          CHECKLY_ACCOUNT_ID: ${{ secrets.E2E_CHECKLY_ACCOUNT_ID }}
          CHECKLY_API_KEY: ${{ secrets.E2E_CHECKLY_API_KEY }}
          CHECKLY_EMPTY_ACCOUNT_ID: ${{ secrets.E2E_EMPTY_CHECKLY_ACCOUNT_ID }}
          CHECKLY_EMPTY_API_KEY: ${{ secrets.E2E_EMPTY_CHECKLY_API_KEY }}
      - name: Save LLM rules as an artifact
        uses: actions/upload-artifact@v4
        with:
          name: llm-rules-test-${{ matrix.os }}
          if-no-files-found: error
          path: packages/cli/dist/ai-context/*
          retention-days: 1
