name: test

on:
  pull_request:
    branches:
      - main
      - next/*
  # Also run on pushes to main so the pnpm store cache is populated on the
  # default branch. GitHub only lets branches inherit caches created on the
  # default branch, so without this every PR branch starts with a cold cache
  # and re-downloads all dependencies from scratch.
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      # Test that the packaging works as well
      - run: pnpm -r pack
      - run: pnpm run lint
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest-x64]
        # checkly is sharded into two; create-checkly runs unsharded (empty
        # shard). `id` is a filesystem-safe label since the shard string
        # contains a '/', which is invalid in artifact names.
        target:
          - { package: checkly, shard: 1/2, id: 1 }
          - { package: checkly, shard: 2/2, id: 2 }
          - { package: create-checkly, shard: '', id: all }
    name: test - ${{ matrix.target.package }} - ${{ matrix.os }} - ${{ matrix.target.shard || matrix.target.id }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v3
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm run prepack
      # The --shard flag is forwarded to the package's vitest invocation. It
      # must NOT be passed after a `--` separator: a pnpm-inserted `--` makes
      # vitest treat `--shard` as a test-name filter and silently run the full
      # suite on every shard instead of partitioning it. create-checkly runs
      # unsharded, so the flag is omitted there.
      - run: "pnpm --filter ${{ matrix.target.package }} run test ${{ matrix.target.shard && format('--shard={0}', matrix.target.shard) || '' }}"
      - name: Save LLM rules as an artifact
        # Only the checkly package produces the AI-context bundle.
        if: matrix.target.package == 'checkly'
        uses: actions/upload-artifact@v4
        with:
          name: llm-rules-test-${{ matrix.os }}-${{ matrix.target.id }}
          if-no-files-found: error
          path: packages/cli/dist/ai-context/*
          retention-days: 1
  test-e2e-checkly:
    # Only on PRs — these hit the live Checkly API. The push-to-main run exists
    # solely to seed the dependency cache, which lint + test already cover.
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest-x64]
        # Same shape as the test job's target matrix, restricted to checkly.
        target:
          - { package: checkly, shard: 1/2, id: 1 }
          - { package: checkly, shard: 2/2, id: 2 }
    name: e2e - ${{ matrix.target.package }} - ${{ matrix.os }} - ${{ matrix.target.shard }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v3
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm run prepack
      # See the test job: --shard must not be passed after a `--` separator.
      - run: pnpm --filter ${{ matrix.target.package }} run test:e2e --shard=${{ matrix.target.shard }}
        env:
          CHECKLY_ACCOUNT_NAME: ${{ secrets.E2E_CHECKLY_ACCOUNT_NAME }}
          CHECKLY_ACCOUNT_ID: ${{ secrets.E2E_CHECKLY_ACCOUNT_ID }}
          CHECKLY_API_KEY: ${{ secrets.E2E_CHECKLY_API_KEY }}
          CHECKLY_EMPTY_ACCOUNT_ID: ${{ secrets.E2E_EMPTY_CHECKLY_ACCOUNT_ID }}
          CHECKLY_EMPTY_API_KEY: ${{ secrets.E2E_EMPTY_CHECKLY_API_KEY }}
  test-e2e-create-checkly:
    # Only on PRs — see test-e2e-checkly above.
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest-x64]
    name: e2e - create-checkly - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v3
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter create-checkly run test:e2e
