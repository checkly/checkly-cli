name: check-ai-context

on:
  pull_request:
    branches:
      - main
      - next/*

jobs:
  check-ai-context:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v3
      # Path filtering is done inside the job (not via an `on:` paths filter) so
      # this required check always runs and reports a status. A workflow skipped
      # by an `on:` paths filter stays "pending" forever and blocks merge.
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            cli:
              - 'packages/cli/**'
      - if: steps.changes.outputs.cli == 'true'
        uses: pnpm/action-setup@v5
        with:
          version: 10
      - if: steps.changes.outputs.cli == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: "pnpm"
      - if: steps.changes.outputs.cli == 'true'
        run: pnpm install --frozen-lockfile
      - if: steps.changes.outputs.cli == 'true'
        run: pnpm run sync:skills
      - name: Check for uncommitted changes in skills/
        if: steps.changes.outputs.cli == 'true'
        run: git diff --exit-code skills/
      - name: Comment on PR if skills/ is out of date
        if: failure() && steps.changes.outputs.cli == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body "## ⚠️ AI context is out of date

          The \`skills/\` directory doesn't match the generated output from \`packages/cli\`.

          Please run the following locally and commit the changes:

          \`\`\`
          pnpm run sync:skills
          \`\`\`"
